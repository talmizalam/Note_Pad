<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#c084fc"/>
<title>NOtes</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#d8b4fe;
  --bg2:#c084fc;
  --card:#f3e8ff;
  --card2:#ede9fe;
  --line:#a855f7;
  --line2:#7c3aed;
  --accent:#7c3aed;
  --text:#3b0764;
  --muted:#7e22ce;
  --radius:18px;
  --w:412px;
}

html{
  width:100%;
  min-height:100%;
  background:#9ca3af;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

body{
  width:var(--w);
  min-height:917px;
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  overflow-x:hidden;
  flex-shrink:0;
  position:relative;
}

@media(max-width:430px){
  html{background:var(--bg);align-items:flex-start;}
  body{width:100vw;min-height:100dvh;}
}

/* ── fuzzy top ── */
.fuzzy-top{
  width:100%;height:48px;flex-shrink:0;
  background:radial-gradient(ellipse 10px 22px at 10px 0%,#e9d5ff 85%,transparent 100%),
             radial-gradient(ellipse 10px 22px at 20px 0%,#ddd6fe 85%,transparent 100%),
             radial-gradient(ellipse 10px 22px at 30px 0%,#ede9fe 85%,transparent 100%);
  background-size:20px 48px;
  background-repeat:repeat-x;
  background-position:0 bottom;
}

/* ── HEADER ── */
header{
  width:100%;padding:8px 20px 4px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{
  font-family:'Boogaloo',cursive;
  font-size:46px;color:var(--text);
  -webkit-text-stroke:2.5px var(--text);
  text-shadow:3px 3px 0 rgba(255,255,255,0.3);
  line-height:1;letter-spacing:2px;
}
.header-right{display:flex;align-items:center;gap:12px;}
.pencil-ico{font-size:26px;line-height:1;filter:hue-rotate(260deg) saturate(1.3);}
.add-btn{
  width:34px;height:34px;border-radius:50%;
  border:2.5px solid var(--text);background:transparent;
  color:var(--text);font-size:22px;font-family:'Boogaloo',cursive;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:background .15s,color .15s;position:relative;
}
.add-btn::after{content:'';position:absolute;inset:-10px;}
.add-btn:active{background:var(--text);color:#fff;}

/* ── HINT ── */
.hint{
  text-align:center;font-size:11px;
  color:rgba(59,7,100,.35);
  padding:0 0 4px;width:100%;flex-shrink:0;
}

/* ── SCROLLABLE MAIN ── */
.main-scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 0 8px;
  display:flex;
  flex-direction:column;
  gap:0;
}

/* ── NOTES GRID ── */
.notes-grid{
  width:100%;padding:4px 14px 6px;
  display:grid;grid-template-columns:1fr 1fr;gap:11px;
  flex-shrink:0;
}

/* ── CARD ── */
.note-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 2px 10px rgba(109,40,217,.12);
  position:relative;cursor:pointer;overflow:hidden;
  padding:13px 11px 9px;min-height:122px;
  animation:popIn .26s ease both;
  touch-action:manipulation;
}
.note-card:active{transform:scale(.97);}
.note-card.wide{
  grid-column:1/-1;min-height:92px;
}
.card-preview{
  position:relative;z-index:2;
  font-size:12.5px;color:var(--text);
  line-height:24px;word-break:break-word;white-space:pre-wrap;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:5;-webkit-box-orient:vertical;
}
.note-card.wide .card-preview{-webkit-line-clamp:3;}
.card-preview.empty{color:rgba(109,40,217,.28);font-style:italic;font-size:11.5px;}
.card-title{
  font-size:13px;font-weight:700;color:var(--text);
  position:relative;z-index:2;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.del-btn{
  position:absolute;top:5px;right:6px;z-index:5;
  background:rgba(237,224,248,.9);border:none;border-radius:50%;
  width:20px;height:20px;font-size:10px;color:var(--accent);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.note-card:hover .del-btn,.note-card.show-del .del-btn{opacity:1;}
@keyframes popIn{from{opacity:0;transform:scale(.83) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.empty-msg{grid-column:1/-1;text-align:center;color:rgba(90,10,160,.35);font-style:italic;padding:22px 0;font-size:.88rem;}

/* ══════════════════════════════════
   BOTTOM SECTIONS
══════════════════════════════════ */
.sections-area{
  width:100%;padding:4px 14px 8px;
  display:flex;flex-direction:column;gap:10px;
  flex-shrink:0;
}

/* section header row */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2px 4px;
}
.section-title{
  font-family:'Boogaloo',cursive;
  font-size:17px;color:var(--text);letter-spacing:.5px;
  -webkit-text-stroke:.8px var(--text);
}
.section-add{
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--text);background:transparent;
  color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Boogaloo',cursive;transition:background .15s,color .15s;
}
.section-add:active{background:var(--text);color:#fff;}

/* ── QUICK NOTE section (tap-to-write bar) ── */
.quick-note-bar{
  background:var(--card2);border-radius:var(--radius);
  box-shadow:0 2px 10px rgba(109,40,217,.12);
  padding:13px 14px 10px;cursor:pointer;
  position:relative;overflow:hidden;touch-action:manipulation;
  transition:transform .15s;
  min-height:80px;
}
.quick-note-bar:active{transform:scale(.98);}
.quick-row{display:flex;align-items:center;gap:10px;position:relative;z-index:2;}
.quick-ico{font-size:22px;filter:hue-rotate(260deg) saturate(1.2);}
.quick-placeholder{
  flex:1;font-size:14px;font-style:italic;font-weight:600;
  color:rgba(59,7,100,.38);line-height:1.4;
}
.quick-plus{
  width:30px;height:30px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Boogaloo',cursive;flex-shrink:0;
}

/* ── CHECKLIST section ── */
.checklist-wrap{
  background:var(--card);border-radius:var(--radius);
  box-shadow:0 2px 10px rgba(109,40,217,.1);
  overflow:hidden;
}
.checklist-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border-bottom:.5px solid rgba(168,85,247,.18);
  cursor:pointer;transition:background .12s;
  touch-action:manipulation;
}
.checklist-item:last-child{border-bottom:none;}
.checklist-item:active{background:rgba(168,85,247,.06);}
.chk-box{
  width:20px;height:20px;border-radius:5px;
  border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.chk-box.checked{background:var(--accent);border-color:var(--accent);}
.chk-box.checked::after{content:'✓';font-size:12px;color:#fff;font-weight:700;}
.chk-text{font-size:13px;color:var(--text);flex:1;line-height:1.3;}
.chk-text.done{text-decoration:line-through;color:rgba(59,7,100,.38);}
.chk-del{
  width:18px;height:18px;border-radius:50%;background:none;border:none;
  color:rgba(168,85,247,.5);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;opacity:0;
  transition:opacity .15s;
}
.checklist-item:hover .chk-del,.checklist-item.show-del .chk-del{opacity:1;}
.chk-del:active{color:var(--accent);}

/* checklist add row */
.chk-add-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  border-top:.5px solid rgba(168,85,247,.18);
}
.chk-input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Nunito',sans-serif;font-size:13px;color:var(--text);
  padding:4px 0;
}
.chk-input::placeholder{color:rgba(109,40,217,.3);font-style:italic;}
.chk-submit{
  width:24px;height:24px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Boogaloo',cursive;flex-shrink:0;
  transition:background .15s;
}
.chk-submit:active{background:var(--line2);}

/* ── REMINDER section ── */
.reminder-list{display:flex;flex-direction:column;gap:8px;}
.reminder-card{
  background:var(--card);border-radius:14px;
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(109,40,217,.09);
  position:relative;touch-action:manipulation;cursor:pointer;
}
.reminder-card:active{transform:scale(.98);}
.rem-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
}
.rem-dot.done{background:rgba(168,85,247,.3);}
.rem-body{flex:1;}
.rem-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
.rem-title.done{text-decoration:line-through;color:rgba(59,7,100,.35);}
.rem-time{font-size:11px;color:var(--muted);margin-top:1px;}
.rem-del{
  width:18px;height:18px;border-radius:50%;background:none;border:none;
  color:rgba(168,85,247,.45);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.reminder-card:hover .rem-del,.reminder-card.show-del .rem-del{opacity:1;}

/* ── FUZZY BOTTOM ── */
.fuzzy-bottom{
  width:100%;height:44px;flex-shrink:0;margin-top:auto;
  background:radial-gradient(ellipse 10px 22px at 10px 100%,#e9d5ff 85%,transparent 100%),
             radial-gradient(ellipse 10px 22px at 20px 100%,#ddd6fe 85%,transparent 100%),
             radial-gradient(ellipse 10px 22px at 30px 100%,#ede9fe 85%,transparent 100%);
  background-size:20px 44px;background-repeat:repeat-x;background-position:0 top;
}

/* ══════════════════════════════════
   FULLSCREEN EDITOR
══════════════════════════════════ */
.editor-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:var(--bg);flex-direction:column;
}
.editor-overlay.open{display:flex;}
@media(min-width:431px){
  .editor-overlay{width:var(--w);left:50%;transform:translateX(-50%);}
}

.editor-header{
  display:flex;align-items:center;padding:14px 16px 10px;gap:10px;
  flex-shrink:0;background:var(--bg);
  border-bottom:1.5px solid rgba(168,85,247,.2);
}
.editor-back{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--text);background:transparent;color:var(--text);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.editor-back:active{background:var(--text);color:#fff;}
.editor-title-input{
  flex:1;font-family:'Boogaloo',cursive;font-size:22px;color:var(--text);
  border:none;background:transparent;outline:none;
  -webkit-text-stroke:.8px var(--text);letter-spacing:1px;
}
.editor-title-input::placeholder{color:rgba(59,7,100,.28);-webkit-text-stroke:0;font-size:17px;}
.btn-save{
  padding:8px 18px;border-radius:20px;border:none;
  background:var(--text);color:#fff;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;flex-shrink:0;transition:background .15s;
}
.btn-save:active{background:var(--accent);}

.btn-share{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--text);background:transparent;
  color:var(--text);font-size:17px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s,color .15s;
}
.btn-share:active{background:var(--text);color:#fff;}

/* share bottom sheet */
.share-sheet{
  display:none;position:fixed;inset:0;z-index:500;
  align-items:flex-end;justify-content:center;
}
.share-sheet.open{display:flex;}
.share-backdrop{
  position:absolute;inset:0;
  background:rgba(59,7,100,.38);
}
.share-panel{
  position:relative;z-index:1;
  width:var(--w);
  background:var(--card);
  border-radius:22px 22px 0 0;
  padding:18px 20px 32px;
  display:flex;flex-direction:column;
  animation:slideUp .25s ease both;
}
@media(max-width:430px){.share-panel{width:100%;}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.share-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(168,85,247,.35);
  margin:0 auto 16px;
}
.share-title{
  font-family:'Boogaloo',cursive;
  font-size:18px;color:var(--text);letter-spacing:.5px;
  margin-bottom:14px;
  -webkit-text-stroke:.6px var(--text);
}
.share-preview{
  background:var(--card2);border-radius:12px;
  padding:12px 14px;font-size:13px;color:var(--text);
  line-height:1.6;max-height:110px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-word;
  margin-bottom:16px;
  border:1.5px solid rgba(168,85,247,.2);
}
.share-preview strong{display:block;font-size:14px;margin-bottom:4px;}
.share-btns{display:flex;gap:10px;}
.share-btn{
  flex:1;padding:11px 10px;border-radius:14px;border:none;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:transform .12s;
}
.share-btn:active{transform:scale(.96);}
.share-btn.native{background:var(--accent);color:#fff;}
.share-btn.copy{background:var(--card2);color:var(--text);border:1.5px solid rgba(168,85,247,.3);}

.editor-body{
  flex:1;position:relative;overflow:hidden;
  background-color:var(--bg);
}
.editor-textarea{
  position:absolute;inset:0;width:100%;height:100%;
  background:transparent;border:none;outline:none;resize:none;
  padding:18px 18px;font-family:'Nunito',sans-serif;
  font-size:16px;color:var(--text);line-height:35px;
  caret-color:var(--accent);z-index:2;-webkit-overflow-scrolling:touch;
}

.editor-footer{
  padding:10px 18px 12px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  border-top:1.5px solid rgba(168,85,247,.15);background:var(--bg);
}
.size-group{display:flex;align-items:center;gap:14px;}
.size-group span{font-size:12px;font-weight:700;color:var(--accent);}
.size-opt{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text);cursor:pointer;}
.size-opt input{accent-color:var(--accent);}
.char-count{font-size:11px;color:rgba(59,7,100,.38);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--text);color:#fff;
  padding:9px 22px;border-radius:20px;font-size:13px;
  font-family:'Nunito',sans-serif;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="fuzzy-top"></div>

<header>
  <div class="logo">NOtes</div>
  <div class="header-right">
    <span class="pencil-ico">✏️</span>
    <button class="add-btn" id="addBtn" aria-label="New note">+</button>
  </div>
</header>
<p class="hint">Tap card to open · Long-press to delete</p>

<!-- scrollable body -->
<div class="main-scroll">

  <!-- NOTES GRID -->
  <div class="notes-grid" id="notesGrid"></div>

  <!-- BOTTOM SECTIONS -->
  <div class="sections-area">

    <!-- Section 1: Quick Note (tap to write) -->
    <div>
      <div class="section-header">
        <span class="section-title">✏️ Quick Note</span>
      </div>
      <div class="quick-note-bar" id="tapWriteBar" role="button" tabindex="0" aria-label="Tap to write a new note">
        <div class="quick-row">
          <span class="quick-ico">📝</span>
          <span class="quick-placeholder">Tap to write a new note…</span>
          <span class="quick-plus">+</span>
        </div>
      </div>
    </div>

    <!-- Section 2: Checklist -->
    <div>
      <div class="section-header">
        <span class="section-title">☑️ Checklist</span>
        <button class="section-add" id="chkAddBtn" aria-label="Add checklist item">+</button>
      </div>
      <div class="checklist-wrap">
        <div id="checklistItems"></div>
        <div class="chk-add-row" id="chkAddRow" style="display:none;">
          <input class="chk-input" id="chkInput" type="text" placeholder="New item…" maxlength="80"/>
          <button class="chk-submit" id="chkSubmit">+</button>
        </div>
      </div>
    </div>

    <!-- Section 3: Reminders -->
    <div>
      <div class="section-header">
        <span class="section-title">🔔 Reminders</span>
        <button class="section-add" id="remAddBtn" aria-label="Add reminder">+</button>
      </div>
      <div class="reminder-list" id="reminderList"></div>
    </div>

  </div><!-- end sections-area -->

</div><!-- end main-scroll -->

<div class="fuzzy-bottom"></div>

<!-- FULLSCREEN EDITOR -->
<div class="editor-overlay" id="editorOverlay" role="dialog" aria-modal="true">
  <div class="editor-header">
    <button class="editor-back" id="btnDiscard" aria-label="Back">←</button>
    <input class="editor-title-input" id="editorTitle" type="text" placeholder="Title…" maxlength="60" autocomplete="off"/>
    <button class="btn-share" id="btnShare" aria-label="Share note">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
    <button class="btn-save" id="btnSave">Save</button>
  </div>
  <div class="editor-body">
    <textarea class="editor-textarea" id="editorTextarea" placeholder="Write your note here…" spellcheck="true"></textarea>
  </div>
  <div class="editor-footer">
    <div class="size-group">
      <span>Card:</span>
      <label class="size-opt"><input type="radio" name="noteSize" value="half" checked/> Half</label>
      <label class="size-opt"><input type="radio" name="noteSize" value="full"/> Full</label>
    </div>
    <span class="char-count" id="charCount">0 chars</span>
  </div>
</div>

<!-- REMINDER ADD MODAL (full-screen) -->
<div class="editor-overlay" id="remOverlay" role="dialog" aria-modal="true">
  <div class="editor-header">
    <button class="editor-back" id="remDiscard" aria-label="Back">←</button>
    <input class="editor-title-input" id="remTitle" type="text" placeholder="Reminder title…" maxlength="60" autocomplete="off"/>
    <button class="btn-save" id="remSave">Add</button>
  </div>
  <div class="editor-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px 24px;">
    <div style="background:rgba(168,85,247,.12);border-radius:14px;padding:18px 22px;width:100%;display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:12px;font-weight:700;color:var(--muted);">DATE</label>
        <input type="date" id="remDate" style="background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--text);outline:none;font-family:'Nunito',sans-serif;width:100%;"/>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="font-size:12px;font-weight:700;color:var(--muted);">TIME</label>
        <input type="time" id="remTime" style="background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--text);outline:none;font-family:'Nunito',sans-serif;width:100%;"/>
      </div>
    </div>
  </div>
</div>

<!-- SHARE BOTTOM SHEET -->
<div class="share-sheet" id="shareSheet">
  <div class="share-backdrop" id="shareBackdrop"></div>
  <div class="share-panel">
    <div class="share-handle"></div>
    <div class="share-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>Share Note
    </div>
    <div class="share-preview" id="sharePreview"></div>
    <div class="share-btns">
      <button class="share-btn native" id="shareBtnNative">
        <span>📲</span> Share
      </button>
      <button class="share-btn copy" id="shareBtnCopy">
        <span>📋</span> Copy text
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE='notesapp_v4';
const CHKSTORE='notesapp_chk';
const REMSTORE='notesapp_rem';

let notes=JSON.parse(localStorage.getItem(STORE)||'[]');
let checks=JSON.parse(localStorage.getItem(CHKSTORE)||'[]');
let reminders=JSON.parse(localStorage.getItem(REMSTORE)||'[]');
let editingId=null;

if(!notes.length){
  notes=[
    {id:uid(),title:'',text:'',size:'half'},
    {id:uid(),title:'',text:'',size:'half'},
    {id:uid(),title:'',text:'',size:'half'},
    {id:uid(),title:'',text:'',size:'half'},
    {id:uid(),title:'',text:'',size:'full'},
  ];
  saveNotes();
}
if(!checks.length){
  checks=[
    {id:uid(),text:'Buy groceries',done:false},
    {id:uid(),text:'Read for 20 minutes',done:false},
    {id:uid(),text:'Call mom',done:true},
  ];
  saveChecks();
}
if(!reminders.length){
  reminders=[
    {id:uid(),title:'Team meeting',datetime:'Today, 3:00 PM',done:false},
    {id:uid(),title:'Dentist appointment',datetime:'Tomorrow, 10:30 AM',done:false},
  ];
  saveRems();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function saveNotes(){localStorage.setItem(STORE,JSON.stringify(notes));}
function saveChecks(){localStorage.setItem(CHKSTORE,JSON.stringify(checks));}
function saveRems(){localStorage.setItem(REMSTORE,JSON.stringify(reminders));}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ────── NOTES ────── */
function renderNotes(){
  const g=document.getElementById('notesGrid');
  if(!notes.length){g.innerHTML='<div class="empty-msg">No notes — tap + to add 🌸</div>';return;}
  g.innerHTML=notes.map((n,i)=>{
    const wide=n.size==='full';
    const content=[n.title,n.text].filter(Boolean).join('\n');
    const has=content.trim().length>0;
    return `<div class="note-card${wide?' wide':''}" data-id="${n.id}" style="animation-delay:${i*.05}s" role="button" tabindex="0">
      <button class="del-btn" data-id="${n.id}">✕</button>
      ${n.title?`<div class="card-title">${esc(n.title)}</div>`:''}
      <div class="card-preview${has?'':' empty'}">${has?esc(n.text||n.title):'Tap to write…'}</div>
    </div>`;
  }).join('');
  g.querySelectorAll('.note-card').forEach(card=>{
    card.addEventListener('click',e=>{if(e.target.classList.contains('del-btn'))return;openEditor(card.dataset.id);});
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openEditor(card.dataset.id);});
    let pt;
    card.addEventListener('touchstart',()=>{pt=setTimeout(()=>card.classList.toggle('show-del'),500);},{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    card.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
  });
  g.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      notes=notes.filter(n=>n.id!==btn.dataset.id);
      saveNotes();renderNotes();toast('Note deleted');
    });
  });
}

/* ────── CHECKLIST ────── */
function renderChecks(){
  const el=document.getElementById('checklistItems');
  if(!checks.length){el.innerHTML='<div style="padding:12px 14px;font-size:13px;color:rgba(109,40,217,.35);font-style:italic;">No items yet…</div>';return;}
  el.innerHTML=checks.map(c=>`
    <div class="checklist-item" data-id="${c.id}" role="button" tabindex="0">
      <div class="chk-box${c.done?' checked':''}" data-id="${c.id}"></div>
      <span class="chk-text${c.done?' done':''}">${esc(c.text)}</span>
      <button class="chk-del" data-id="${c.id}" aria-label="Delete">✕</button>
    </div>`).join('');
  el.querySelectorAll('.chk-box').forEach(box=>{
    box.addEventListener('click',e=>{
      e.stopPropagation();
      const c=checks.find(x=>x.id===box.dataset.id);
      if(c){c.done=!c.done;saveChecks();renderChecks();}
    });
  });
  el.querySelectorAll('.checklist-item').forEach(row=>{
    let pt;
    row.addEventListener('touchstart',()=>{pt=setTimeout(()=>row.classList.toggle('show-del'),500);},{passive:true});
    row.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    row.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
  });
  el.querySelectorAll('.chk-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      checks=checks.filter(c=>c.id!==btn.dataset.id);
      saveChecks();renderChecks();toast('Item removed');
    });
  });
}

const chkAddBtn=document.getElementById('chkAddBtn');
const chkAddRow=document.getElementById('chkAddRow');
const chkInput=document.getElementById('chkInput');
const chkSubmit=document.getElementById('chkSubmit');
chkAddBtn.addEventListener('click',()=>{
  chkAddRow.style.display=chkAddRow.style.display==='none'?'flex':'none';
  if(chkAddRow.style.display==='flex')setTimeout(()=>chkInput.focus(),80);
});
function addCheckItem(){
  const t=chkInput.value.trim();if(!t)return;
  checks.push({id:uid(),text:t,done:false});
  saveChecks();renderChecks();
  chkInput.value='';chkAddRow.style.display='none';
  toast('Item added ✓');
}
chkSubmit.addEventListener('click',addCheckItem);
chkInput.addEventListener('keydown',e=>{if(e.key==='Enter')addCheckItem();});

/* ────── REMINDERS ────── */
function renderReminders(){
  const el=document.getElementById('reminderList');
  if(!reminders.length){
    el.innerHTML='<div style="padding:10px 2px;font-size:13px;color:rgba(109,40,217,.35);font-style:italic;">No reminders yet…</div>';
    return;
  }
  el.innerHTML=reminders.map(r=>`
    <div class="reminder-card" data-id="${r.id}" role="button" tabindex="0">
      <div class="rem-dot${r.done?' done':''}"></div>
      <div class="rem-body">
        <div class="rem-title${r.done?' done':''}">${esc(r.title)}</div>
        <div class="rem-time">${esc(r.datetime||'')}</div>
      </div>
      <button class="rem-del" data-id="${r.id}" aria-label="Delete">✕</button>
    </div>`).join('');
  el.querySelectorAll('.reminder-card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('rem-del'))return;
      const r=reminders.find(x=>x.id===card.dataset.id);
      if(r){r.done=!r.done;saveRems();renderReminders();}
    });
    let pt;
    card.addEventListener('touchstart',()=>{pt=setTimeout(()=>card.classList.toggle('show-del'),500);},{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    card.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
  });
  el.querySelectorAll('.rem-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      reminders=reminders.filter(r=>r.id!==btn.dataset.id);
      saveRems();renderReminders();toast('Reminder deleted');
    });
  });
}

/* reminder add overlay */
const remOverlay=document.getElementById('remOverlay');
document.getElementById('remAddBtn').addEventListener('click',()=>{
  document.getElementById('remTitle').value='';
  document.getElementById('remDate').value='';
  document.getElementById('remTime').value='';
  remOverlay.classList.add('open');
  setTimeout(()=>document.getElementById('remTitle').focus(),120);
});
document.getElementById('remDiscard').addEventListener('click',()=>remOverlay.classList.remove('open'));
document.getElementById('remSave').addEventListener('click',()=>{
  const title=document.getElementById('remTitle').value.trim();
  if(!title){toast('Enter a title');return;}
  const d=document.getElementById('remDate').value;
  const t=document.getElementById('remTime').value;
  let dt='';
  if(d&&t)dt=new Date(d+'T'+t).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  else if(d)dt=new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  else if(t)dt=t;
  reminders.push({id:uid(),title,datetime:dt,done:false});
  saveRems();renderReminders();
  remOverlay.classList.remove('open');
  toast('Reminder added 🔔');
});

/* ────── NOTE EDITOR ────── */
const overlay=document.getElementById('editorOverlay');
const edTitle=document.getElementById('editorTitle');
const edTextarea=document.getElementById('editorTextarea');
const charCount=document.getElementById('charCount');

edTextarea.addEventListener('input',()=>{charCount.textContent=edTextarea.value.length+' chars';});

function openEditor(id){
  if(id){
    const n=notes.find(x=>x.id===id);if(!n)return;
    editingId=id;edTitle.value=n.title||'';edTextarea.value=n.text||'';
    document.querySelector(`input[name=noteSize][value=${n.size||'half'}]`).checked=true;
  }else{
    editingId=null;edTitle.value='';edTextarea.value='';
    document.querySelector('input[name=noteSize][value=half]').checked=true;
  }
  charCount.textContent=edTextarea.value.length+' chars';
  overlay.classList.add('open');
  setTimeout(()=>edTextarea.focus(),150);
}

function closeEditor(doSave){
  if(doSave){
    const title=edTitle.value.trim();
    const text=edTextarea.value.trim();
    const size=document.querySelector('input[name=noteSize]:checked').value;
    if(!title&&!text){toast('Nothing to save');overlay.classList.remove('open');return;}
    if(editingId){
      const n=notes.find(x=>x.id===editingId);
      if(n){n.title=title;n.text=text;n.size=size;}
    }else{
      notes.push({id:uid(),title,text,size});
    }
    saveNotes();renderNotes();
    toast(editingId?'Note updated ✓':'Note saved 🎉');
  }
  overlay.classList.remove('open');editingId=null;
  edTextarea.blur();edTitle.blur();
}

/* ────── SHARE ────── */
const shareSheet=document.getElementById('shareSheet');
const sharePreview=document.getElementById('sharePreview');

function buildShareText(){
  const title=edTitle.value.trim();
  const text=edTextarea.value.trim();
  let out='';
  if(title) out+=title+'\n'+'─'.repeat(Math.min(title.length,30))+'\n';
  if(text) out+=text;
  return out.trim();
}

function openShareSheet(){
  const txt=buildShareText();
  if(!txt){toast('Nothing to share yet');return;}
  let preview='';
  const title=edTitle.value.trim();
  const body=edTextarea.value.trim();
  if(title) preview+=`<strong>${esc(title)}</strong>`;
  if(body) preview+=esc(body.slice(0,180))+(body.length>180?'…':'');
  sharePreview.innerHTML=preview||'(empty)';
  shareSheet.classList.add('open');
}

document.getElementById('btnShare').addEventListener('click',openShareSheet);
document.getElementById('shareBackdrop').addEventListener('click',()=>shareSheet.classList.remove('open'));

document.getElementById('shareBtnNative').addEventListener('click',async()=>{
  const txt=buildShareText();
  const title=edTitle.value.trim()||'My Note';
  if(navigator.share){
    try{
      await navigator.share({title,text:txt});
      shareSheet.classList.remove('open');
    }catch(e){
      if(e.name!=='AbortError') toast('Share cancelled');
    }
  }else{
    /* fallback: copy + hint */
    try{await navigator.clipboard.writeText(txt);toast('Copied! (Share not supported in browser)');}
    catch{fallbackCopy(txt);}
    shareSheet.classList.remove('open');
  }
});

document.getElementById('shareBtnCopy').addEventListener('click',async()=>{
  const txt=buildShareText();
  try{
    await navigator.clipboard.writeText(txt);
    toast('Note copied to clipboard 📋');
  }catch{
    fallbackCopy(txt);
  }
  shareSheet.classList.remove('open');
});

function fallbackCopy(txt){
  const ta=document.createElement('textarea');
  ta.value=txt;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');toast('Note copied to clipboard 📋');}
  catch{toast('Could not copy — please copy manually');}
  document.body.removeChild(ta);
}

document.getElementById('addBtn').addEventListener('click',()=>openEditor(null));
document.getElementById('tapWriteBar').addEventListener('click',()=>openEditor(null));
document.getElementById('tapWriteBar').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openEditor(null);});
document.getElementById('btnSave').addEventListener('click',()=>closeEditor(true));
document.getElementById('btnDiscard').addEventListener('click',()=>closeEditor(false));

document.addEventListener('keydown',e=>{
  if(overlay.classList.contains('open')){
    if(e.key==='Escape')closeEditor(false);
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter')closeEditor(true);
  }
  if(remOverlay.classList.contains('open')&&e.key==='Escape')remOverlay.classList.remove('open');
});

renderNotes();
renderChecks();
renderReminders();
</script>
</body>
</html>
